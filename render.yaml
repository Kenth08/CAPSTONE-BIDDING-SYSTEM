# Render Blueprint — deploys the Django API and the React frontend together.
# Push this to your repo, then in Render: New + → Blueprint → pick this repo.
# Values marked `sync: false` must be filled in via the Render dashboard.
services:
  # ── Backend: Django REST API ──────────────────────────────────────────────
  - type: web
    name: eprocurement-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: SECRET_KEY
        generateValue: true        # Render generates a strong secret
      - key: DEBUG
        value: "False"
      # Supabase Postgres connection (copy from your Supabase project settings).
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_PORT
        value: "5432"
      # Set this to your deployed frontend URL after the static site exists,
      # e.g. https://eprocurement-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false
      # Optional: SMTP creds so password-reset emails actually get delivered.
      # Leave unset and the backend just logs emails to the server console.
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USE_TLS
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

  # ── Frontend: React + Vite static site ────────────────────────────────────
  - type: web
    name: eprocurement-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./dist
    envVars:
      # Your backend URL + /api, e.g. https://eprocurement-api.onrender.com/api
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
